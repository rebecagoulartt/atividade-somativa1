name: Alerta Discord

on:
  push:
    branches: [ "main" ]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Enviar alerta para Discord
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{\"content\": \"Novo commit em ${{ github.repository }} por ${{ github.actor }}\"}" \
          ${{ secrets.DISCORD_WEBHOOK }}
