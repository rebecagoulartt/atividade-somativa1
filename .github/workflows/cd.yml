name: CD - Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Run application
        run: |
          python calculadora.py

      - name: Deploy concluído
        run: echo "Deploy realizado com sucesso!"
